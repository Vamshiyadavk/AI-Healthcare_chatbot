<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HealthBot – Error</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f0f9ff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { background: #fff; border-radius: 16px; padding: 2.5rem; max-width: 480px; text-align: center; box-shadow: 0 4px 24px rgba(37,99,235,.1); }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; color: #1e293b; margin-bottom: .5rem; }
    p  { color: #64748b; font-size: .95rem; margin-bottom: 1.5rem; }
    a  { background: #2563eb; color: #fff; text-decoration: none; padding: .7rem 1.5rem; border-radius: 10px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">⚠️</div>
    <h1>Something went wrong</h1>
    <p>{{ message }}</p>
    <a href="/">← Back to Home</a>
  </div>
</body>
</html>
